interface:
  display_name: "LandPPT PPT Generation"
  short_description: "Markdown-first LandPPT generation, recovery, share, narration, and export workflows"
  default_prompt: "Use $landppt-ppt-generation whenever a user wants non-browser automation of a LandPPT project workflow, recovery after interruption, free-template verification, or post-generation share/export/speech/narration operations. Prefer scripts/run_flow.py for end-to-end runs and scripts/project_ops.py for follow-up work on an existing project_id. For existing projects, lead with state checks instead of replaying the full cookbook: use GET /api/projects, GET /api/projects/{project_id}, GET /api/projects/{project_id}/slides-data, and especially GET /api/projects/{project_id}/free-template when the question is about free-template state or whether slides may start. Never start slides before free-template confirmation, never treat stream completion alone as final success, and if a run may already have created a project, resume with the existing project_id instead of creating a duplicate project."
