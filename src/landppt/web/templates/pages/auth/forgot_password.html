<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找回密码 - LandPPT</title>
    <link rel="icon" type="image/svg+xml" href="/static/images/landppt-logo.png">
    <link rel="alternate icon" href="/static/images/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/pages/auth/auth.css">
    <link rel="stylesheet" href="/static/css/shared/site_notice.css">
    <style>
        .auth-shell--reset {
            min-height: 100vh;
            min-height: 100dvh;
            align-items: center;
            justify-content: center;
            padding: clamp(20px, 4vw, 40px);
        }

        .auth-card--reset {
            display: block;
            width: min(620px, 100%);
            min-height: auto;
            height: auto;
            border-radius: 30px;
            border: 1px solid rgba(11, 11, 13, 0.08);
            background: rgba(255, 255, 255, 0.82);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .auth-card--reset .form-panel {
            min-height: auto;
            background: transparent;
            overflow: visible;
            padding: clamp(24px, 4vw, 40px);
        }

        .auth-card--reset .form-shell {
            width: 100%;
            gap: 14px;
        }

        .reset-brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .reset-brand__logo {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: var(--paper);
            padding: 8px;
            box-shadow: 0 10px 28px rgba(11, 11, 13, 0.12);
        }

        .reset-brand__name {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.4rem;
            font-weight: 900;
            letter-spacing: -0.03em;
            color: var(--ink);
        }

        .reset-brand__badge {
            padding: 5px 10px;
            border-radius: 999px;
            background: rgba(11, 11, 13, 0.06);
            border: 1px solid rgba(11, 11, 13, 0.08);
            font-size: 0.78rem;
            font-weight: 900;
            letter-spacing: 0.02em;
        }

        .auth-kicker {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: fit-content;
            padding: 7px 12px;
            border-radius: 999px;
            border: 1px solid rgba(11, 11, 13, 0.12);
            background: rgba(11, 11, 13, 0.04);
            color: var(--muted);
            font-size: 0.74rem;
            font-weight: 900;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .auth-header {
            display: grid;
            gap: 4px;
        }

        .turnstile-panel {
            border-radius: 18px;
            border: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(11, 11, 13, 0.02), rgba(11, 11, 13, 0.05));
            padding: 16px;
        }

        .turnstile-panel #forgot-turnstile {
            min-height: 65px;
            display: grid;
            justify-content: center;
            align-items: center;
        }

        .field-note {
            margin-top: 10px;
            color: var(--muted);
            font-size: 0.88rem;
            line-height: 1.5;
        }

        .code-row .btn {
            min-width: 144px;
        }

        .links--compact {
            justify-content: space-between;
            flex-wrap: wrap;
        }

        @media (max-width: 620px) {
            .auth-shell--reset {
                padding: 16px;
            }

            .auth-card--reset {
                width: 100%;
                border-radius: 24px;
            }

            .code-row {
                grid-template-columns: 1fr;
            }

            .code-row .btn {
                width: 100%;
                min-width: 0;
            }

            .reset-brand {
                align-items: flex-start;
            }

            .reset-brand__name {
                flex-wrap: wrap;
            }
        }
    </style>
</head>

<body class="auth-body">
    <div class="auth-bg" aria-hidden="true">
        <div class="auth-bg__grid"></div>
        <div class="auth-bg__noise"></div>
    </div>

    <main class="auth-shell auth-shell--reset">
        <section class="auth-card auth-card--reset">
            <div class="form-panel reset-panel">
                <div class="form-shell">
                    <div id="authSiteNotice" class="site-notice site-notice--hidden" hidden></div>
                    <div class="reset-brand">
                        <img class="reset-brand__logo" src="/static/images/landppt-logo.png" alt="LandPPT">
                        <div class="reset-brand__name">
                            <span>LandPPT</span>
                            <span class="reset-brand__badge">AI PPT</span>
                        </div>
                    </div>

                    <div class="auth-header">
                        <span class="auth-kicker">Password Reset</span>
                        <h2>重置账号密码</h2>
                    </div>

                    <div class="alert-area" id="resetAlert">
                        {% if error %}
                        <div class="alert alert--danger">
                            <i class="fas fa-exclamation-circle"></i>
                            <div>{{ error }}</div>
                        </div>
                        {% endif %}
                        {% if success %}
                        <div class="alert alert--success">
                            <i class="fas fa-check-circle"></i>
                            <div>{{ success }}</div>
                        </div>
                        {% endif %}
                    </div>

                    <form class="form" method="post" action="/auth/reset-password" id="resetForm" autocomplete="off">
                        <div class="field">
                            <label for="email">邮箱地址</label>
                            <div class="control">
                                <i class="fa-regular fa-envelope"></i>
                                <input type="email" id="email" name="email" required placeholder="输入注册时使用的邮箱"
                                    value="{{ email or '' }}" autocomplete="email">
                            </div>
                        </div>

                        {% if turnstile_enabled and turnstile_site_key %}
                        <div class="field">
                            <label for="forgot-turnstile">发送验证码前验证</label>
                            <div class="turnstile-panel">
                                <div id="forgot-turnstile" aria-label="Turnstile 人机验证"></div>
                                <input type="hidden" name="turnstile_token" id="turnstile-token" value="">
                                <p class="field-note">通过人机验证后，才可以发送找回密码验证码。</p>
                            </div>
                        </div>
                        {% endif %}

                        <div class="field">
                            <label for="code">验证码</label>
                            <div class="code-row">
                                <div class="control">
                                    <i class="fa-solid fa-shield"></i>
                                    <input type="text" id="code" name="code" required placeholder="输入 6 位验证码" maxlength="6"
                                        inputmode="numeric" autocomplete="one-time-code">
                                </div>
                                <button class="btn btn-secondary" type="button" id="sendCodeBtn">发送验证码</button>
                            </div>
                        </div>

                        <div class="field">
                            <label for="new_password">新密码</label>
                            <div class="control">
                                <i class="fa-solid fa-key"></i>
                                <input type="password" id="new_password" name="new_password" required
                                    placeholder="设置新密码，至少 6 位" minlength="6" autocomplete="new-password">
                                <button class="toggle js-toggle-password" type="button" data-target="new_password"
                                    aria-label="显示或隐藏新密码">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="field">
                            <label for="confirm_password">确认新密码</label>
                            <div class="control">
                                <i class="fa-solid fa-key"></i>
                                <input type="password" id="confirm_password" name="confirm_password" required
                                    placeholder="再次输入新密码" minlength="6" autocomplete="new-password">
                                <button class="toggle js-toggle-password" type="button" data-target="confirm_password"
                                    aria-label="显示或隐藏确认密码">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <button class="btn btn-primary" type="submit" id="resetPasswordBtn">
                            <span>重置密码</span>
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </form>

                    <div class="links links--compact">
                        <a href="/auth/login">返回登录</a>
                        <a href="/auth/login?tab=register">注册新账户</a>
                    </div>

                    <div class="auth-footer">
                        <span>LandPPT</span>
                        <span>&copy; 2026</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        (() => {
            const resetAlert = document.getElementById("resetAlert");
            const resetForm = document.getElementById("resetForm");
            const emailInput = document.getElementById("email");
            const codeInput = document.getElementById("code");
            const newPasswordInput = document.getElementById("new_password");
            const confirmPasswordInput = document.getElementById("confirm_password");
            const sendCodeBtn = document.getElementById("sendCodeBtn");
            const turnstileTokenInput = document.getElementById("turnstile-token");
            const turnstileEnabled = {{ 'true' if turnstile_enabled and turnstile_site_key else 'false' }};
            let turnstileWidgetId = null;
            let countdown = 0;

            const escapeHtml = (value) => String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");

            const renderAlert = (message, type = "danger") => {
                if (!resetAlert) return;
                const icon = type === "success" ? "fa-check-circle" : "fa-exclamation-circle";
                const cls = type === "success" ? "alert--success" : "alert--danger";
                resetAlert.innerHTML = `
                    <div class="alert ${cls}">
                        <i class="fas ${icon}"></i>
                        <div>${escapeHtml(message)}</div>
                    </div>
                `;
            };

            const validateEmail = (email) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

            const getTurnstileToken = () => (turnstileTokenInput ? turnstileTokenInput.value.trim() : "");

            const resetTurnstileWidget = () => {
                if (turnstileTokenInput) {
                    turnstileTokenInput.value = "";
                }
                if (!turnstileEnabled) return;
                if (!window.turnstile || typeof window.turnstile.reset !== "function") return;
                if (turnstileWidgetId === null) return;
                window.turnstile.reset(turnstileWidgetId);
            };

            const renderTurnstile = () => {
                if (!turnstileEnabled) return;
                const host = document.getElementById("forgot-turnstile");
                if (!host || turnstileWidgetId !== null) return;
                if (!window.turnstile || typeof window.turnstile.render !== "function") return;

                turnstileWidgetId = window.turnstile.render(host, {
                    sitekey: "{{ turnstile_site_key or '' }}",
                    theme: "auto",
                    language: "zh-cn",
                    callback: (token) => {
                        if (turnstileTokenInput) {
                            turnstileTokenInput.value = token;
                        }
                    },
                    "expired-callback": () => {
                        if (turnstileTokenInput) {
                            turnstileTokenInput.value = "";
                        }
                    },
                    "error-callback": () => {
                        if (turnstileTokenInput) {
                            turnstileTokenInput.value = "";
                        }
                        renderAlert("人机验证加载失败，请刷新页面后重试。");
                    },
                });
            };

            window.onForgotPasswordTurnstileReady = renderTurnstile;

            const updateCountdown = () => {
                if (countdown <= 0) {
                    sendCodeBtn.disabled = false;
                    sendCodeBtn.textContent = sendCodeBtn.dataset.label || "发送验证码";
                    return;
                }
                sendCodeBtn.disabled = true;
                sendCodeBtn.textContent = `${countdown}s`;
                countdown -= 1;
                window.setTimeout(updateCountdown, 1000);
            };

            const togglePasswordVisibility = (button) => {
                const targetId = button.dataset.target;
                if (!targetId) return;
                const input = document.getElementById(targetId);
                if (!input) return;
                const visible = input.type === "text";
                input.type = visible ? "password" : "text";
                const icon = button.querySelector("i");
                if (icon) {
                    icon.className = visible ? "fas fa-eye" : "fas fa-eye-slash";
                }
            };

            sendCodeBtn.dataset.label = sendCodeBtn.textContent.trim() || "发送验证码";

            sendCodeBtn.addEventListener("click", async () => {
                const email = emailInput.value.trim();
                if (!email) {
                    renderAlert("请先输入邮箱地址。");
                    emailInput.focus();
                    return;
                }
                if (!validateEmail(email)) {
                    renderAlert("请输入有效的邮箱地址。");
                    emailInput.focus();
                    return;
                }
                if (turnstileEnabled && !getTurnstileToken()) {
                    renderAlert("请先完成人机验证，通过后才可发送验证码。");
                    return;
                }

                sendCodeBtn.disabled = true;
                sendCodeBtn.textContent = "发送中...";

                try {
                    const response = await fetch("/auth/api/send-code", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            email,
                            code_type: "reset",
                            turnstile_token: getTurnstileToken(),
                        }),
                    });
                    const data = await response.json();

                    if (response.ok && data.success) {
                        renderAlert("验证码已发送到你的邮箱，请及时查收。", "success");
                        countdown = 60;
                        updateCountdown();
                    } else {
                        renderAlert(data.message || "验证码发送失败，请稍后再试。");
                        sendCodeBtn.disabled = false;
                        sendCodeBtn.textContent = sendCodeBtn.dataset.label || "发送验证码";
                    }
                } catch (error) {
                    renderAlert(`验证码发送失败：${error.message || error}`);
                    sendCodeBtn.disabled = false;
                    sendCodeBtn.textContent = sendCodeBtn.dataset.label || "发送验证码";
                } finally {
                    if (turnstileEnabled) {
                        resetTurnstileWidget();
                    }
                }
            });

            [newPasswordInput, confirmPasswordInput].forEach((input) => {
                input.addEventListener("input", () => {
                    if (confirmPasswordInput.value && confirmPasswordInput.value !== newPasswordInput.value) {
                        confirmPasswordInput.setCustomValidity("两次输入的密码不一致");
                    } else {
                        confirmPasswordInput.setCustomValidity("");
                    }
                });
            });

            resetForm.addEventListener("submit", (event) => {
                if (newPasswordInput.value !== confirmPasswordInput.value) {
                    event.preventDefault();
                    confirmPasswordInput.setCustomValidity("两次输入的密码不一致");
                    confirmPasswordInput.reportValidity();
                    return;
                }
                confirmPasswordInput.setCustomValidity("");
            });

            document.querySelectorAll(".js-toggle-password").forEach((button) => {
                button.addEventListener("click", () => togglePasswordVisibility(button));
            });

            if (turnstileEnabled && window.turnstile && typeof window.turnstile.render === "function") {
                renderTurnstile();
            }

            if (emailInput && !emailInput.value) {
                emailInput.focus();
            } else if (codeInput && !codeInput.value) {
                codeInput.focus();
            }
        })();
    </script>
    <script src="/static/js/shared/site_notice.js?v=20260322"></script>
    <script>
        window.SiteNotice?.loadPublicSettings({
            noticeContainer: 'authSiteNotice',
        });
    </script>
    {% if turnstile_enabled and turnstile_site_key %}
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onForgotPasswordTurnstileReady&render=explicit"
        async defer></script>
    {% endif %}
</body>

</html>
